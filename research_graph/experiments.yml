  data: [D00_canonical_wire_loop_via]
  physics: [P01_biot_savart_maxwell_forward, P02_divB_zero]
  forward: [F01_analytic_reference, F02_centerline_biot_savart]
  observation: [O01_ideal_Bxyz]
  representation: [R01_pixel_current_map]
  algorithm: []
  protocol: [S01_random_split]
  metrics: [M01_field_l2_or_rmse, M05_divB_residual, M15_real_sanity_pass_fail]
  outputs:
    - outputs/by_claim/C01_forward_sanity/FORWARD_SANITY_EVIDENCE.md
