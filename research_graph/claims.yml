    algorithm:
    - A03_stream_function_or_pinn_baseline
    - A19_certified_current_projection_inverse
    protocol:
    - S01_random_split
    metrics:
    - M01_field_l2_or_rmse
    - M13_family_generalization_gap
    - M24_observable_current_subspace_fraction
    - M25_dark_current_hallucination_norm
  supported_by:
  - E02_observability_bxy_bz
  - E03_two_layer_via_topology
  - E13_multi_height_multistate_observability
  - E15_four_layer_via_chain_benchmark
  - E17_l1_curl_divergence_free_baseline
  - E28_magnetic_transfer_matrix_observable_invariants
  - E30_dual_schur_active_defect_certificate
  - E31_pad_schur_reachability_certificate
  - E32_pad_pitch_schur_phase_diagram
  - E33_certified_observable_current_subspace_inversion
  limited_by: []
  contradicted_by: []
  cannot_claim:
  - arbitrary multilayer recovery from one magnetic plane
  - layer-disambiguated recovery without priors or extra observations
  - full H0/H1/H2/H3 transfer-matrix separability under the current E28 generator
  limitations:
  - Thin-sheet and centerline assumptions remain idealized.
  - E28 supports only a generated-domain observable quotient Q0={H0}, Q12={H1,H2},
    Q3={H3}; H1_via and H2_model_gap remain unresolved.
  - E28 H1/H2 phase-diagram audit found 0/32 positive Gram Gamma rows under
    the phase nuisance budget; the default row has Gamma -0.0948871365 and
    would require eps+rho <= 0.0028658462 versus observed 0.0977529827.
  - E28 directional statistical Gram certificate tightens the quotient min Gamma
    from 0.4511206603 to 0.5323884196, but H1/H2 remains unresolved with
    directional Gram Gamma -0.0560703448.
  - E30 shows that the same generated graph has a sharp active-measurement
    boundary where ordinary boundary ports fail for central via-open localization,
    an 87-state top/bottom perimeter-boundary basis also fails, and local dual
    Schur endpoint excitation yields positive pairwise Gamma. This is a
    generated-domain local-access upper bound, not pad-feasible real validation.
  - E31 gives an exact pad-Schur reachability theorem and a positive generated
    pad-synthesis certificate. Perimeter pads have near-zero reachability, but
    top candidate-projection surface pads plus a reference pad synthesize enough
    Schur voltage drop for positive finite-difference magnetic Gamma.
  - E32 turns the E31 pad assumption into a generated pad-pitch/locality
    boundary; exact candidate top pads keep min reachability 0.4767196129,
    top+bottom candidate pads reach 0.9534392258, perimeter pads remain
    2.48821324e-09, and sparse grid offsets can collapse to 3.37239662e-04
    at stride 2 or 4.75424120e-10 at stride 5+.
  - E33 gives a strict current-inversion version of the boundary; under the
    generated thin-sheet Fourier observation, single-height current inversion
    has only 8/144 Fisher-stable modes, while full naive inversion hallucinates
    dark current with total RMSE 720.7362501 and the certified stable projection
    has stable-mode RMSE 0.1164511532.
  next_required_evidence:
  - Validate multi-height observability with real measurement or external solver held-out
    rows.
  - Stress the E28 Gram quotient on broader layout ensembles, external-solver held-out
    transfer matrices, and real-calibrated gain/standoff nuisance models.
  - Convert E30 dual Schur endpoint excitations into pad-feasible boundary
    active measurement designs and test whether the positive margin survives.
  - Convert the E32 pad-pitch/locality boundary into a contact/package/current
    limited active design and test the selected designs with magnetic Gamma,
    broader layouts, and external solver rho.
  - Move E33 observable-current projection from diagonal Fourier modes to
    graph/Hodge/CAD-like current bases and validate against external solvers.
  last_updated: '2026-05-06'
