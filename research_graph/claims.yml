C02_single_plane_identifiability_boundary:
  title: Single-plane magnetic observations expose an identifiability boundary for
    multilayer current inversion.
  short_name: identifiability_boundary
  status: supported
  scope:
    data:
    - D00_canonical_wire_loop_via
    - D01_two_layer_route
    forward:
    - F02_centerline_biot_savart
